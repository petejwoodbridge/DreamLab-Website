<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <!-- Orb 1 — purple -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Orb 2 — cyan -->
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Orb 3 — pink -->
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ec4899" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glowing orbs -->
  <ellipse cx="240"  cy="200" rx="340" ry="300" fill="url(#orb1)"/>
  <ellipse cx="960"  cy="430" rx="320" ry="280" fill="url(#orb2)"/>
  <ellipse cx="600"  cy="500" rx="260" ry="220" fill="url(#orb3)"/>

  <!-- Subtle border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="16" ry="16"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- dreamlab wordmark -->
  <text x="100" y="330"
        font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
        font-weight="900"
        font-size="188"
        letter-spacing="14"
        fill="url(#textgrad)"
        opacity="0.97">dreamlab</text>

  <!-- Divider line -->
  <rect x="100" y="370" width="220" height="3" rx="2" fill="url(#textgrad)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="100" y="426"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="26"
        font-weight="400"
        letter-spacing="4"
        fill="rgba(255,255,255,0.55)"
        text-transform="uppercase">AI · IMMERSIVE TECH · CREATIVE TECHNOLOGY</text>

  <!-- Location pill -->
  <rect x="100" y="468" width="462" height="44" rx="22"
        fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="321" y="495"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="2"
        fill="rgba(255,255,255,0.5)"
        text-anchor="middle">MANCHESTER · LIVERPOOL · CUMBRIA · LONDON</text>

  <!-- Decorative star top-right -->
  <g transform="translate(1070, 120)" opacity="0.6">
    <polygon points="0,-18 4,-6 17,-6 7,3 11,16 0,8 -11,16 -7,3 -17,-6 -4,-6"
             fill="url(#textgrad)"/>
  </g>
  <g transform="translate(1110, 80)" opacity="0.35">
    <polygon points="0,-10 2.5,-3.5 10,-3.5 4,2 6,9 0,5 -6,9 -4,2 -10,-3.5 -2.5,-3.5"
             fill="#a78bfa"/>
  </g>
  <g transform="translate(1045, 75)" opacity="0.25">
    <polygon points="0,-7 1.8,-2.4 7,-2.4 2.8,1.4 4.3,6.4 0,3.5 -4.3,6.4 -2.8,1.4 -7,-2.4 -1.8,-2.4"
             fill="#06b6d4"/>
  </g>

  <!-- Small dot accent -->
  <circle cx="1100" cy="490" r="5" fill="#ec4899" opacity="0.7"/>
  <circle cx="1120" cy="510" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="1085" cy="515" r="2" fill="#06b6d4" opacity="0.4"/>

  <!-- dreamlab.org.uk -->
  <text x="1100" y="560"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="20"
        font-weight="400"
        letter-spacing="2"
        fill="rgba(255,255,255,0.3)"
        text-anchor="end">dreamlab.org.uk</text>
</svg>
